<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đèn kéo quân</title>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
        font-family: Arial;
    }

    h1 {
        position: absolute;
        top: 20px;
        color: white;
    }

    .lantern {
        position: relative;
        width: 300px;
        height: 300px;
        transform-style: preserve-3d;
        animation: rotate 10s linear infinite;
    }

    /* Hover vào là dừng */
    .lantern:hover {
        animation-play-state: paused;
    }

    .face {
        position: absolute;
        width: 200px;
        height: 200px;
        left: 50px;
        top: 50px;
    }

    .face img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
        border: 3px solid white;
    }

    /* 6 mặt 3D */
    .front  { transform: rotateY(0deg) translateZ(150px); }
    .back   { transform: rotateY(180deg) translateZ(150px); }
    .left   { transform: rotateY(-90deg) translateZ(150px); }
    .right  { transform: rotateY(90deg) translateZ(150px); }
    .top    { transform: rotateX(90deg) translateZ(150px); }
    .bottom { transform: rotateX(-90deg) translateZ(150px); }

    @keyframes rotate {
        from { transform: rotateX(0deg) rotateY(0deg); }
        to   { transform: rotateX(360deg) rotateY(360deg); }
    }
</style>

</head>
<body>

<h1>🎡 Đèn kéo quân</h1>

<div class="lantern">
    <!-- 6 ảnh random từ internet -->
    <div class="face front"><img src="https://picsum.photos/300?random=1"></div>
    <div class="face back"><img src="https://picsum.photos/300?random=2"></div>
    <div class="face left"><img src="https://picsum.photos/300?random=3"></div>
    <div class="face right"><img src="https://picsum.photos/300?random=4"></div>
    <div class="face top"><img src="https://picsum.photos/300?random=5"></div>
    <div class="face bottom"><img src="https://picsum.photos/300?random=6"></div>
</div>

</body>
</html>
