<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đèn kéo quân</title>

<style>
body {
    text-align: center;
    background: #111;
    color: white;
}

.container {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 100px auto;
}

.item {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 10px;
}

.container {
    animation: quay 5s linear infinite;
}

@keyframes quay {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h1>Đèn kéo quân</h1>

<div class="container" id="den">
    <img class="item" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQqy_CFbEaorJdkM-7JySI_I0EGGqQu4C-WJw&s" style="top:0; left:110px;">
    <img class="item" src="https://i.pinimg.com/1200x/4f/3b/4a/4f3b4a4218c0c087b6d79e7af7c062e3.jpg" style="top:50px; left:200px;">
    <img class="item" src="https://i.pinimg.com/originals/ea/66/2f/ea662fe44e4b8671e42f82a81fdb9327.jpg" style="top:180px; left:200px;">
    <img class="item" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQAUrxaJdepiLthMJoim9XwjAt5B-PqAHozIA&s" style="top:230px; left:110px;">
    <img class="item" src="https://i.pinimg.com/236x/6f/18/a9/6f18a939d9abda045990660e77a10779.jpg" style="top:180px; left:20px;">
    <img class="item" src="https://image.dienthoaivui.com.vn/x,webp,q90/https://dashboard.dienthoaivui.com.vn/uploads/dashboard/editor_upload/nen-trang-tron-23.jpg" style="top:50px; left:20px;">
</div>

<script>
const den = document.getElementById("den");

den.addEventListener("mouseover", () => {
    den.style.animationPlayState = "paused";
});

den.addEventListener("mouseout", () => {
    den.style.animationPlayState = "running";
});
</script>

</body>
</html>
