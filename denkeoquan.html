<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đèn Kéo Quân</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(to right, #000, #222);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      perspective: 1200px;
      color: white;
      font-family: Arial;
    }

    h1 {
      position: absolute;
      top: 20px;
    }

    .container {
      width: 220px;
      height: 220px;
      position: relative;
      transform-style: preserve-3d;
      animation: rotate 12s linear infinite;
    }

    .container.pause {
      animation-play-state: paused;
    }

    .item {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 15px #fff;
    }

    .item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 6 mặt */
    .item:nth-child(1) { transform: rotateY(0deg) translateZ(300px); }
    .item:nth-child(2) { transform: rotateY(60deg) translateZ(300px); }
    .item:nth-child(3) { transform: rotateY(120deg) translateZ(300px); }
    .item:nth-child(4) { transform: rotateY(180deg) translateZ(300px); }
    .item:nth-child(5) { transform: rotateY(240deg) translateZ(300px); }
    .item:nth-child(6) { transform: rotateY(300deg) translateZ(300px); }

    @keyframes rotate {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    .back {
      position: absolute;
      bottom: 20px;
      text-decoration: none;
      color: white;
      border: 1px solid white;
      padding: 8px 15px;
      border-radius: 5px;
    }

    .back:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

<h1>🎎 Đèn Kéo Quân</h1>

<div class="container" id="carousel">
  <div class="item"><img src="https://picsum.photos/id/1015/400/400"></div>
  <div class="item"><img src="https://picsum.photos/id/1025/400/400"></div>
  <div class="item"><img src="https://picsum.photos/id/1035/400/400"></div>
  <div class="item"><img src="https://picsum.photos/id/1045/400/400"></div>
  <div class="item"><img src="https://picsum.photos/id/1055/400/400"></div>
  <div class="item"><img src="https://picsum.photos/id/1065/400/400"></div>
</div>

<a href="index.html" class="back">⬅ Quay lại Portfolio</a>

<script>
  const carousel = document.getElementById("carousel");

  carousel.addEventListener("mouseenter", () => {
    carousel.classList.add("pause");
  });

  carousel.addEventListener("mouseleave", () => {
    carousel.classList.remove("pause");
  });
</script>

</body>
</html>
