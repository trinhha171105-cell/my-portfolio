<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đèn kéo quân</title>

<style>
body {
    margin: 0;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* vòng tròn */
.container {
    position: relative;
    width: 300px;
    height: 300px;
    animation: rotate 8s linear infinite;
}

/* ảnh */
.item {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid white;
}

/* quay */
@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container" id="den">
    <img class="item" src="https://picsum.photos/100?1" style="top:0; left:110px;">
    <img class="item" src="https://picsum.photos/100?2" style="top:60px; left:210px;">
    <img class="item" src="https://picsum.photos/100?3" style="top:180px; left:210px;">
    <img class="item" src="https://picsum.photos/100?4" style="top:240px; left:110px;">
    <img class="item" src="https://picsum.photos/100?5" style="top:180px; left:10px;">
    <img class="item" src="https://picsum.photos/100?6" style="top:60px; left:10px;">
</div>

<script>
const den = document.getElementById("den");

den.addEventListener("mouseover", () => {
    den.style.animationPlayState = "paused";
});

den.addEventListener("mouseout", () => {
    den.style.animationPlayState = "running";
});
</script>

</body>
</html>
